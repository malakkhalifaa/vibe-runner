# Vibe Runner — static site (no build step)
# Repo root has no index.html; the app is in lane-learn/
[build]
  publish = "lane-learn"
  # command omitted — nothing to compile

# ES modules + import maps work over HTTPS by default on Netlify
[[headers]]
  for = "/*.html"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
